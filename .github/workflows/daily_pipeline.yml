name: Daily Pipeline

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: [self-hosted]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: python -m pip install --break-system-packages -r requirements.txt

      - name: Run pipeline
        env:
          CLASH_API_TOKEN: ${{ secrets.CLASH_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python pipeline.py
